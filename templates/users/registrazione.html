{% extends 'base.html' %}

{% block title %}Registrati - MirrorBreaker{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="post-card p-4 text-center">
            
            <i class="fa-solid fa-user-plus fa-3x mb-3" style="color: var(--kiki-gold);"></i>
            <h2 class="mb-4" style="color: var(--kiki-text-main); font-family: 'Georgia', serif; font-style: italic;">Unisciti a Noi</h2>

            <form method="POST" action="{% url 'users:registrazione' %}">
                {% csrf_token %}
                
                <!-- Cicliamo i campi del form in modo dinamico -->
                {% for field in form %}
                    <div class="mb-3 text-start">
                        <label for="{{ field.id_for_label }}" class="form-label text-muted">{{ field.label }}</label>
                        {{ field }}
                        <!-- Mostra errori specifici per ogni campo -->
                        {% if field.errors %}
                            <div class="text-danger small mt-1" style="color: var(--kiki-red) !important;">
                                {{ field.errors|striptags }}
                            </div>
                        {% endif %}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-kiki w-100 py-2 fs-5 mt-3">Registrati</button>
            </form>

            <hr class="my-4" style="border-color: var(--kiki-border);">

            <p class="text-muted mb-0">
                Hai già un account? 
                <a href="{% url 'users:login' %}" style="color: var(--kiki-gold); text-decoration: none; font-weight: bold;">Accedi</a>
            </p>

        </div>
    </div>
</div>

<style>
    /* Stilizza automaticamente i campi di testo del form di Django */
    .post-card input[type="text"], 
    .post-card input[type="password"], 
    .post-card input[type="email"] {
        width: 100%;
        background-color: var(--kiki-bg);
        color: var(--kiki-text-main);
        border: 1px solid var(--kiki-border);
        border-radius: 6px;
        padding: 8px 12px;
    }
    .post-card input:focus {
        outline: none;
        border-color: var(--kiki-gold);
    }
</style>
{% endblock %}
